# fly.toml para trongkai-engine
# Region scl (Santiago) para baja latencia con cehta-platform en Chile

app = "trongkai-engine"
primary_region = "scl"

[build]

[env]
  LOG_LEVEL = "info"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/docs"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpus = 1

[deploy]
  strategy = "rolling"
